services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: architecture_flow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  flowable:
    image: flowable/flowable-rest:7.1.0
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/architecture_flow
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      FLOWABLE_REST_APP_ADMIN_USER_ID: admin
      FLOWABLE_REST_APP_ADMIN_PASSWORD: test
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  minio_data:
